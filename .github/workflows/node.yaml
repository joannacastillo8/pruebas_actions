name: Node.js CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4   # mejor versión

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'       # evitar warning

      - run: npm ci
      - run: npm test
``